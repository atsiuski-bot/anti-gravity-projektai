  <!-- viewport-fit=cover opts the page into the full display area on notched / home-indicator
       devices so `env(safe-area-inset-*)` returns the real insets. Without it those insets are 0
       and the safe-area padding in BottomNavigation / PwaUpdatePrompt (and the photo viewer) is
       inert — the bottom bar then sits under the iOS home indicator in the installed PWA. -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#ffffff" />
  <!-- Theme boot (ADR 0008): set <html data-theme> from the saved choice BEFORE first paint so
       the dark canvas never flashes light on load. Reads only localStorage + the OS preference
       (Firestore isn't available pre-React; ThemeSync reconciles cross-device a tick later).
       The CSS-variable palette in index.css keys off this attribute. -->
  <script>
    (function () {
      try {
        var stored = localStorage.getItem('theme');
        var sysDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        var resolved = (stored === 'light' || stored === 'dark') ? stored : (sysDark ? 'dark' : 'light');
        document.documentElement.dataset.theme = resolved;
        var meta = document.querySelector('meta[name="theme-color"]');
        if (meta) meta.content = resolved === 'dark' ? '#0E1117' : '#ffffff';
      } catch (e) { /* storage blocked — default light applies */ }
    })();
  </script>

  <title>Gildija</title>
  <!-- Capture the install prompt BEFORE the (heavily code-split) app bundle loads. Chrome fires
       `beforeinstallprompt` very early — often before React has mounted and any in-app listener
       exists — so a component-level handler misses it and can never offer install. We stash the
       event on a global and re-emit it as `pwa-install-available`; useInstallPrompt seeds from the
       global on mount AND listens for the re-emitted event, so the prompt is never lost to a race. -->
  <script>
    window.__deferredInstallPrompt = null;
    window.addEventListener('beforeinstallprompt', function (e) {
      e.preventDefault();
      window.__deferredInstallPrompt = e;
      window.dispatchEvent(new Event('pwa-install-available'));
    });
    window.addEventListener('appinstalled', function () {
      window.__deferredInstallPrompt = null;
      window.dispatchEvent(new Event('pwa-app-installed'));
    });
  </script>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
  <!-- Sub-floor fallback: browsers without ES-module support (very old Android WebView / in-app
       browsers below the build floor) never run the module bundle above and would otherwise show a
       blank white page. This nomodule script runs ONLY on those browsers (modern ones ignore it)
       and replaces the empty root with a friendly upgrade prompt. Kept ES5 so it parses anywhere. -->
  <script nomodule>
    document.getElementById('root').innerHTML =
      '<div style="max-width:32rem;margin:15vh auto;padding:0 1.5rem;font-family:system-ui,-apple-system,sans-serif;text-align:center;color:#374151">' +
      '<h1 style="font-size:1.25rem;margin:0 0 .75rem">Atnaujinkite naršyklę</h1>' +
      '<p style="line-height:1.6;margin:0">Gildija veikia naujesnėse naršyklėse. Atnaujinkite Chrome, Safari, Firefox arba Edge ir bandykite dar kartą.</p>' +
      '</div>';
  </script>
</body>
